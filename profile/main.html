<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Tailor Base</title>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <div class="aboutus">
            <li><a href="#">Favorite</a></li>
          </div>
          <li><a class="logo" href="main.html">tailorbase</a></li>
          <div class="login-btn">
            <li><input id="client-search" class="search" type="text" placeholder="Search" name=""></li>
          </div>
          <div class="profile">
            <li><a href="profile.html"><img  src="../image/profile-logo.png" alt=""></a></li>
          </div>
        </ul>
      </nav>
    </header>
    <section class="clients-section">
      <h2>Clients</h2>
      <div id="clients-container" class="clients-grid"></div>
    </section>
    <div class="add">
      <button class="add-client" type="button">
          +
      </button>
    </div>


    <div id="add-menu" popover class="popover-content">
        <input type="text" id="client-name" class="input-name" placeholder="Client name">
        
        <div class="size-grid">
            <div class="size-item">Height : <input type="number" id="height" class="measurement"></div>
            <div class="size-item">Waist : <input type="number" id="waist" class="measurement"></div>
            <div class="size-item">Bust : <input type="number" id="bust" class="measurement"></div>
            <div class="size-item">Hips : <input type="number" id="hips" class="measurement"></div>
          </div>
          
          <button class="more-sizes-btn" type="button" id="toggle-more">More size <span>▽</span></button>
          
          <div class="extra-sizes" id="extra-sizes-div">
            <div class="size-grid">
              <div class="size-item">Shoulder Width: <input type="number" id="sh-width" class="measurement"></div>
              <div class="size-item">Shoulder Length: <input type="number" id="sh-length" class="measurement"></div>
              <div class="size-item">Back Width: <input type="number" id="back-width" class="measurement"></div>
              <div class="size-item">Back Waist Length: <input type="number" id="back-waist-length" class="measurement"></div>
              <div class="size-item">Neck Girth: <input type="number" id="neck-girth" class="measurement"></div>
              <div class="size-item">Sleeve Length: <input type="number" id="sleeve-length" class="measurement"></div>
              <div class="size-item">Arm Girth: <input type="number" id="arm-girth" class="measurement"></div>
              <div class="size-item">Wrist: <input type="number" id="wrist" class="measurement"></div>
              <div class="size-item">Inseam: <input type="number" id="inseam" class="measurement"></div>
              <div class="size-item">Outseam: <input type="number" id="outseam" class="measurement"></div>
              <div class="size-item">Thigh: <input type="number" id="thigh" class="measurement"></div>
              <div class="size-item">Crotch Depth: <input type="number" id="crotch-depth" class="measurement"></div>
              <div class="size-item">Full Length: <input type="number" id="full-length" class="measurement"></div>
            </div>
          </div>
          <textarea id="description" class="description-area" placeholder="description"></textarea>

        
          <button class="save-btn" id="save-client-btn">save</button>
        </div>

    <div id="client-details-popover" popover class="popover-content client-details-popover">
      <h3 id="detail-client-name">Client name</h3>
      <div id="detail-measurements" class="detail-measurements"></div>
      <p id="detail-description" class="detail-description"></p>
      <div class="detail-actions">
        <button type="button" id="edit-client-details" class="edit-btn">Edit</button>
        <button type="button" id="delete-client-details" class="delete-btn">Delete</button>
      </div>
    </div>
  
    <script type="module" src="main.js"></script>
     
  </body>
</html>
